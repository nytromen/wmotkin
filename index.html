<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4facfe">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Push Your Luck</title>
  
  <link rel="manifest" href="https://gist.githubusercontent.com/nytromen/d188c5a1f88a5707eb636d8be0738bd1/raw/6938734589325c75c1484e4af8ee48ca41e8e9a8/manifest.json">
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* 3D Transform Utilities */
    .perspective-1000 { perspective: 1000px; }
    .preserve-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
    
    body {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      background-image: radial-gradient(circle at top, rgba(255,255,255,0.3) 0%, transparent 60%), linear-gradient(135deg, #5EE7DF 0%, #B490CA 100%);
      color: #334155;
      margin: 0;
      font-family: 'Fredoka', sans-serif;
      min-height: 100vh;
    }
    .font-serif {
      font-family: 'Fredoka', sans-serif; 
    }
    
    /* Utility for chunky casual buttons */
    .btn-casual:active:not(:disabled) {
      transform: translateY(6px);
      border-bottom-width: 0px;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { motion, AnimatePresence } = window.Motion;

    // --- Icons ---
    const User = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>);
    const RefreshCw = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>);
    const Shield = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>);
    const Skull = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><path d="M8 20v2h8v-2"/><path d="m12.5 17-.5-1-.5 1h1z"/><path d="M16 20a2 2 0 0 0 1.56-3.25 8 8 0 1 0-11.12 0A2 2 0 0 0 8 20"/></svg>);
    const Gem = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 3h12l4 6-10 13L2 9Z"/><path d="M11 3 8 9l4 13 4-13-3-6"/><path d="M2 9h20"/></svg>);
    const Lock = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>);
    const Layers = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 12 12 17 22 12"/><polyline points="2 17 12 22 22 17"/></svg>);

    // --- Лицо карты (Открытая) ---
    const GRADE_COLORS = {
      Silver: 'border-slate-100 shadow-[0_8px_0_#94a3b8]',
      Gold: 'border-yellow-100 shadow-[0_8px_0_#d97706]',
      Platinum: 'border-cyan-100 shadow-[0_8px_0_#0891b2]',
      Mythic: 'border-fuchsia-100 shadow-[0_8px_0_#c026d3]',
    };

    const GRADE_BG = {
      Silver: 'bg-gradient-to-b from-slate-100 to-slate-300',
      Gold: 'bg-gradient-to-b from-yellow-300 to-orange-400',
      Platinum: 'bg-gradient-to-b from-cyan-300 to-blue-500',
      Mythic: 'bg-gradient-to-b from-fuchsia-400 to-purple-600',
    };

    const GRADE_TEXT = {
      Silver: 'text-slate-800',
      Gold: 'text-orange-950',
      Platinum: 'text-cyan-950',
      Mythic: 'text-white drop-shadow-md',
    };

    // --- Рубашка карты (Закрытая) ---
    const GRADE_BACK_BORDER = {
      Silver: 'border-slate-400 shadow-[0_8px_0_#64748b]',
      Gold: 'border-yellow-400 shadow-[0_8px_0_#b45309]',
      Platinum: 'border-cyan-400 shadow-[0_8px_0_#0369a1]',
      Mythic: 'border-fuchsia-500 shadow-[0_8px_0_#a21caf]',
    };

    const GRADE_BACK_BG = {
      Silver: 'bg-slate-500', 
      Gold: 'bg-emerald-500', 
      Platinum: 'bg-gradient-to-br from-slate-700 to-slate-900', 
      Mythic: 'bg-[linear-gradient(135deg,#ff2a5f,#ff9933,#00e5ff,#b100ff)]', 
    };

    const GRADE_QUESTION_COLOR = {
      Silver: 'text-slate-300',
      Gold: 'text-yellow-300',
      Platinum: 'text-cyan-300',
      Mythic: 'text-fuchsia-300',
    };

    let cardsDatabase = [];

    fetch('https://gist.githubusercontent.com/nytromen/c7ab1b404ea37f380c232653122cae0d/raw/c72a64af775739b57d64d3ce11671d4e7f2a46ce/gistfile1.txt')
      .then(res => res.json())
      .then(data => {
        cardsDatabase = data;
      })
      .catch(err => console.error("Failed to load cards database", err));

    // --- Logic ---
    function generateCard(playerLevel, stage) {
      let grade;
      const rand = Math.random();
      
      if (playerLevel < 15) {
        grade = rand < 0.6 ? 'Silver' : rand < 0.9 ? 'Gold' : 'Platinum';
      } else if (playerLevel < 50) {
        grade = rand < 0.4 ? 'Silver' : rand < 0.7 ? 'Gold' : rand < 0.95 ? 'Platinum' : 'Mythic';
      } else {
        grade = rand < 0.2 ? 'Silver' : rand < 0.5 ? 'Gold' : rand < 0.85 ? 'Platinum' : 'Mythic';
      }

      let type;
      const typeRand = Math.random();
      
      if (grade === 'Silver') {
        if (typeRand < 0.10) type = 'Reroll';
        else if (typeRand < 0.50) type = 'Loot';
        else type = 'Enemy';
      } else if (grade === 'Gold') {
        if (typeRand < 0.35) type = 'Loot';
        else type = 'Enemy';
      } else if (grade === 'Platinum') {
        if (typeRand < 0.25) type = 'Loot';
        else type = 'Enemy';
      } else {
        if (typeRand < 0.15) type = 'Loot';
        else type = 'Enemy';
      }

      let min = 1, max = 10;
      
      if (type === 'Enemy') {
        const stageBonus = stage * 2;
        if (grade === 'Silver') {
          min = Math.max(1, Math.floor(playerLevel * 0.4)) + stageBonus;
          max = Math.max(5, Math.floor(playerLevel * 0.8)) + stageBonus;
        } else if (grade === 'Gold') {
          min = Math.max(6, Math.floor(playerLevel * 0.8)) + stageBonus;
          max = Math.max(15, Math.floor(playerLevel * 1.2)) + stageBonus;
        } else if (grade === 'Platinum') {
          min = Math.max(16, Math.floor(playerLevel * 1.2)) + stageBonus;
          max = Math.max(35, Math.floor(playerLevel * 1.6)) + stageBonus;
        } else if (grade === 'Mythic') {
          min = Math.max(36, Math.floor(playerLevel * 1.6)) + stageBonus;
          max = Math.max(75, Math.floor(playerLevel * 2.2)) + stageBonus;
        }
      } else {
        if (grade === 'Silver') {
          min = Math.max(1, Math.floor(playerLevel * 0.1));
          max = Math.max(3, Math.floor(playerLevel * 0.2));
        } else if (grade === 'Gold') {
          min = Math.max(4, Math.floor(playerLevel * 0.25));
          max = Math.max(10, Math.floor(playerLevel * 0.4));
        } else if (grade === 'Platinum') {
          min = Math.max(11, Math.floor(playerLevel * 0.5));
          max = Math.max(25, Math.floor(playerLevel * 0.7));
        } else if (grade === 'Mythic') {
          min = Math.max(26, Math.floor(playerLevel * 0.8));
          max = Math.max(50, Math.floor(playerLevel * 1.0));
        }
      }

      const value = Math.floor(Math.random() * (max - min + 1)) + min;
      
      let name = `Unknown ${type}`;
      let description = "";

      if (cardsDatabase && cardsDatabase.length > 0) {
        const filtered = cardsDatabase.filter(c => c.grade === grade && c.type === type);
        if (filtered.length > 0) {
          const randomCard = filtered[Math.floor(Math.random() * filtered.length)];
          name = randomCard.name;
          description = randomCard.description || "";
        }
      }

      if (type === 'Reroll') {
        name = 'Реролл';
      }

      return {
        id: Math.random().toString(36).substring(7),
        grade,
        type,
        name,
        description,
        value,
        revealed: false,
      };
    }

    function generateStacks(playerLevel, stage) {
      return [0, 1, 2].map(id => ({
        id,
        topCard: generateCard(playerLevel, stage),
        cardsDrawn: 0,
        maxCards: Math.floor(Math.random() * 3) + 2,
        locked: false,
      }));
    }

    // --- Main App Component ---
    function App() {
      const [playerLevel, setPlayerLevel] = useState(10);
      const [rerolls, setRerolls] = useState(0);
      const [stacks, setStacks] = useState([]);
      const [processing, setProcessing] = useState(false);
      const [gameOver, setGameOver] = useState(false);
      const [score, setScore] = useState(0);
      const [stage, setStage] = useState(1);
      
      const [activeSilverCard, setActiveSilverCard] = useState(null);
      const [shakingCard, setShakingCard] = useState(null);
      const [pendingCard, setPendingCard] = useState(null);

      const playerLevelRef = React.useRef(playerLevel);
      const stageRef = React.useRef(stage);

      useEffect(() => { playerLevelRef.current = playerLevel; }, [playerLevel]);
      useEffect(() => { stageRef.current = stage; }, [stage]);

      useEffect(() => {
        setStacks(generateStacks(playerLevel, stage));
      }, []);

      const resolveCard = (stackIndex, card) => {
        const currentLevel = playerLevelRef.current;
        
        if (card.type === 'Enemy') {
          if (currentLevel >= card.value) {
            setPlayerLevel(prev => prev + Math.floor(card.value / 2) + 1);
            setScore(prev => prev + card.value * 10);
          } else {
            setGameOver(true);
            setProcessing(false);
            setPendingCard(null);
            return;
          }
        } else if (card.type === 'Loot') {
          setPlayerLevel(prev => prev + card.value);
          setScore(prev => prev + card.value * 5);
        } else if (card.type === 'Reroll') {
          setRerolls(prev => prev + 1);
          setScore(prev => prev + 50);
        }

        let nextLevel = currentLevel;
        if (card.type === 'Enemy' && currentLevel >= card.value) nextLevel += Math.floor(card.value / 2) + 1;
        else if (card.type === 'Loot') nextLevel += card.value;

        setStacks(prevStacks => {
          const nextStacks = [...prevStacks];
          const currentStack = { ...nextStacks[stackIndex] };
          currentStack.cardsDrawn += 1;

          if (currentStack.cardsDrawn >= currentStack.maxCards) {
            currentStack.locked = true;
            currentStack.topCard = null;
          } else {
            currentStack.topCard = generateCard(nextLevel, stageRef.current);
          }
          nextStacks[stackIndex] = currentStack;
          return nextStacks;
        });

        setPendingCard(null);
        setProcessing(false);
      };

      const handleCardClick = (stackId) => {
        if (processing || gameOver || pendingCard || shakingCard) return;

        const stackIndex = stacks.findIndex(s => s.id === stackId);
        const stack = stacks[stackIndex];
        if (stack.locked || !stack.topCard) return;

        setProcessing(true);
        const card = stack.topCard;

        if (card.grade === 'Platinum' || card.grade === 'Mythic') {
          setShakingCard(card.id);
          setTimeout(() => {
            setShakingCard(null);
            const newStacks = [...stacks];
            newStacks[stackIndex].topCard.revealed = true;
            setStacks(newStacks);
            setPendingCard({ stackIndex, card });
          }, 600);
          return;
        }

        const newStacks = [...stacks];
        newStacks[stackIndex].topCard.revealed = true;
        setStacks(newStacks);

        if (card.grade === 'Silver') {
          setActiveSilverCard(card.id);
          setTimeout(() => {
            setActiveSilverCard(null);
            resolveCard(stackIndex, card);
          }, 1000); 
        } else if (card.grade === 'Gold') {
          setTimeout(() => {
            setPendingCard({ stackIndex, card });
          }, 400);
        }
      };

      const allLocked = stacks.length > 0 && stacks.every(s => s.locked);
      const guaranteedFatal = stacks.length > 0 && stacks.every(s => {
        if (s.locked || !s.topCard) return true;
        return s.topCard.type === 'Enemy' && s.topCard.value > playerLevel;
      });

      const canFreeReroll = allLocked || guaranteedFatal;
      const canReroll = canFreeReroll || rerolls > 0;

      const handleReroll = () => {
        if (!canReroll || processing || gameOver || pendingCard) return;
        if (!canFreeReroll) {
          setRerolls(prev => prev - 1);
        }
        const nextStage = stage + 1;
        setStage(nextStage);
        setStacks(generateStacks(playerLevel, nextStage));
      };

      const restartGame = () => {
        setPlayerLevel(10);
        setRerolls(0);
        setScore(0);
        setStage(1);
        setGameOver(false);
        setPendingCard(null);
        setActiveSilverCard(null);
        setShakingCard(null);
        setProcessing(false);
        setStacks(generateStacks(10, 1));
      };

      return (
        <div className="min-h-screen font-sans flex flex-col md:flex-row items-center justify-center p-4 gap-8 md:gap-16 overflow-hidden">
          
          {/* СВЕТЛАЯ КАЗУАЛЬНАЯ ПАНЕЛЬ ИГРОКА */}
          <div className="w-full max-w-sm md:w-64 flex flex-row md:flex-col items-center justify-between md:justify-center p-6 bg-white/95 backdrop-blur-md rounded-[2rem] border-b-[8px] border-slate-200 shadow-[0_15px_30px_rgba(0,0,0,0.15)] z-10 relative overflow-hidden">
            
            <div className="flex flex-col items-center gap-2 w-full text-center relative z-10">
              {/* ЗАКРУГЛЕННЫЙ КВАДРАТ ИКОНКИ ПЕРСОНАЖА */}
              <div className="w-16 h-16 md:w-24 md:h-24 bg-green-100 rounded-2xl md:rounded-3xl flex items-center justify-center border-4 border-white shadow-inner">
                <User className="w-8 h-8 md:w-12 md:h-12 text-green-500" />
              </div>
              <div className="mt-2">
                <div className="text-slate-400 text-[10px] md:text-sm font-black uppercase tracking-widest mb-1">LVL Игрока</div>
                <div className="text-5xl md:text-7xl font-black text-green-500 leading-none drop-shadow-[0_4px_0_rgba(21,128,61,1)]">
                  {playerLevel}
                </div>
              </div>
            </div>
            
            <div className="flex flex-col items-center gap-4 mt-0 md:mt-10 w-full relative z-10">
              <div className="flex flex-col items-center w-full">
                <div className="flex items-center justify-between bg-blue-50 px-4 py-3 rounded-2xl border-b-4 border-blue-200 w-full">
                  <div className="flex items-center gap-2 text-blue-500 font-bold">
                    <RefreshCw className="w-5 h-5" />
                    <span className="text-xs uppercase">Рероллы</span>
                  </div>
                  <span className="font-black text-blue-600 text-xl">{rerolls}</span>
                </div>
              </div>
              <div className="flex justify-between w-full px-2 mt-2">
                <div className="text-xs text-slate-400 font-bold tracking-wider">ЭТАП <span className="text-slate-700">{stage}</span></div>
                <div className="text-xs text-slate-400 font-bold tracking-wider">ОЧКИ <span className="text-amber-500">{score}</span></div>
              </div>
            </div>
          </div>

          <div className="flex flex-col items-center gap-10 w-full max-w-3xl z-10">
            {/* СТОЛ С КАРТАМИ */}
            <div className="flex justify-center gap-4 md:gap-8 w-full">
              {stacks.map(stack => (
                <div key={stack.id} className="relative w-28 h-40 md:w-44 md:h-64 flex-shrink-0">
                  
                  {/* Задние слои (толщина стопки) - Теперь они соответствуют цвету грейда, а не белые! */}
                  {!stack.locked && stack.cardsDrawn < stack.maxCards - 1 && (
                    <div className={`absolute top-2 md:top-3 left-0 w-full h-full rounded-[1.5rem] opacity-40 shadow-sm ${GRADE_BACK_BG[stack.topCard.grade]}`} />
                  )}
                  {!stack.locked && stack.cardsDrawn < stack.maxCards - 2 && (
                    <div className={`absolute top-4 md:top-6 left-0 w-full h-full rounded-[1.5rem] opacity-20 shadow-sm ${GRADE_BACK_BG[stack.topCard.grade]}`} />
                  )}

                  <AnimatePresence mode="wait">
                    {stack.topCard && !stack.locked ? (
                      (pendingCard && pendingCard.card.id === stack.topCard.id) ? (
                        <motion.div key="empty" className="absolute top-0 left-0 w-full h-full" />
                      ) : (
                        <motion.div
                          key={stack.topCard.id}
                          layoutId={`card-${stack.topCard.id}`}
                          className={`absolute top-0 left-0 w-full h-full cursor-pointer perspective-1000 ${activeSilverCard === stack.topCard.id || shakingCard === stack.topCard.id ? 'z-50' : 'z-10'}`}
                          onClick={() => handleCardClick(stack.id)}
                          animate={shakingCard === stack.topCard.id ? { x: [-8, 8, -8, 8, -8, 8, -8, 8, 0], y: [-2, 2, -2, 2, -2, 2, -2, 2, 0] } : { x: 0, y: 0 }}
                          transition={{ duration: 0.6 }}
                          whileHover={{ y: processing ? 0 : -10 }}
                          whileTap={{ scale: processing ? 1 : 0.95 }}
                        >
                          <motion.div
                            className="w-full h-full relative preserve-3d"
                            animate={{ 
                              rotateY: stack.topCard.revealed ? 180 : 0,
                              scale: activeSilverCard === stack.topCard.id ? 1.05 : 1
                            }}
                            transition={{ duration: 0.4 }}
                          >
                          
                          {/* РУБАШКА КАРТЫ С УЗОРАМИ И ВЫРОВНЕННЫМ ТЕКСТОМ */}
                          <div className={`absolute top-0 left-0 w-full h-full backface-hidden rounded-3xl border-[6px] md:border-[8px] flex flex-col items-center justify-between py-4 md:py-6 overflow-hidden ${GRADE_BACK_BG[stack.topCard.grade]} ${GRADE_BACK_BORDER[stack.topCard.grade]}`}>
                            {/* Текстура узора */}
                            <div className="absolute inset-0 opacity-25 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] pointer-events-none mix-blend-overlay"></div>
                            
                            {/* Текст Грейда (Выровненный, с 3D эффектом) */}
                            <div className="text-white font-black text-lg md:text-2xl uppercase tracking-[0.1em] z-10 drop-shadow-[0_3px_0_rgba(0,0,0,0.4)]">
                              {stack.topCard.grade}
                            </div>

                            {/* Вопросик по центру */}
                            <div className={`font-black text-6xl md:text-7xl drop-shadow-md z-10 ${GRADE_QUESTION_COLOR[stack.topCard.grade]}`}>
                              ?
                            </div>
                            
                            {/* Счетчик карт */}
                            <div className="text-[10px] md:text-sm text-white font-bold z-10 bg-black/25 px-4 py-1.5 rounded-full flex items-center gap-1 backdrop-blur-sm border border-white/20">
                              Еще {stack.maxCards - stack.cardsDrawn}
                            </div>
                          </div>

                          {/* ЛИЦО КАРТЫ (С 3D-РАМКОЙ) */}
                          <div className={`absolute top-0 left-0 w-full h-full backface-hidden rounded-3xl border-[6px] md:border-[8px] flex flex-col items-center justify-center rotate-y-180 ${GRADE_COLORS[stack.topCard.grade]} ${GRADE_BG[stack.topCard.grade]} overflow-hidden`}>
                            <div className="z-10 flex flex-col items-center p-2 text-center">
                              {stack.topCard.type === 'Enemy' && <Skull className="w-10 h-10 md:w-16 md:h-16 text-red-500 mb-2 drop-shadow-md" />}
                              {stack.topCard.type === 'Loot' && <Gem className="w-10 h-10 md:w-16 md:h-16 text-emerald-500 mb-2 drop-shadow-md" />}
                              {stack.topCard.type === 'Reroll' && <RefreshCw className="w-10 h-10 md:w-16 md:h-16 text-blue-500 mb-2 drop-shadow-md" />}

                              <div className={`text-4xl md:text-6xl font-black drop-shadow-sm ${GRADE_TEXT[stack.topCard.grade]}`}>
                                {stack.topCard.type === 'Reroll' ? '+1' : stack.topCard.value}
                              </div>
                              
                              <div className={`text-[10px] md:text-xs font-bold uppercase mt-2 ${GRADE_TEXT[stack.topCard.grade]} opacity-90 leading-tight`}>
                                {stack.topCard.name}
                              </div>
                            </div>
                          </div>
                          </motion.div>
                        </motion.div>
                      )
                    ) : (
                      <motion.div
                        key="locked"
                        initial={{ opacity: 0 }}
                        animate={{ opacity: 1 }}
                        className="absolute top-0 left-0 w-full h-full bg-slate-800/80 backdrop-blur-sm rounded-3xl border-4 border-slate-700 flex flex-col items-center justify-center z-20"
                      >
                        <Lock className="w-10 h-10 md:w-12 md:h-12 text-slate-400 mb-2" />
                        <div className="text-xs md:text-sm font-black text-slate-400 uppercase tracking-widest">Закрыто</div>
                      </motion.div>
                    )}
                  </AnimatePresence>
                </div>
              ))}
            </div>

            {/* ЯРКАЯ ГРАДИЕНТНАЯ КНОПКА РЕРОЛЛА */}
            <div className="w-full flex justify-center mt-4">
              <button
                onClick={handleReroll}
                disabled={!canReroll || processing || gameOver || pendingCard}
                className={`btn-casual px-8 py-4 md:px-12 md:py-5 rounded-full font-black uppercase tracking-widest transition-all text-sm md:text-xl border-b-[8px] ${
                  canReroll && !processing && !gameOver && !pendingCard
                    ? canFreeReroll
                      ? 'bg-gradient-to-b from-green-400 to-green-500 border-green-600 text-white hover:from-green-300 hover:to-green-400 shadow-[0_10px_20px_rgba(34,197,94,0.3)]'
                      : 'bg-gradient-to-b from-blue-400 to-blue-500 border-blue-600 text-white hover:from-blue-300 hover:to-blue-400 shadow-[0_10px_20px_rgba(59,130,246,0.3)]'
                    : 'bg-slate-300 border-slate-400 text-slate-500 cursor-not-allowed'
                }`}
              >
                {canFreeReroll ? 'Бесплатный Реролл' : `Реролл Стола (-1)`}
              </button>
            </div>
          </div>

          {/* ВСПЛЫВАЮЩЕЕ ОКНО КАРТЫ */}
          <AnimatePresence>
            {pendingCard && (
              <motion.div
                initial={{ opacity: 0 }}
                animate={{ opacity: 1 }}
                exit={{ opacity: 0 }}
                className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50"
              >
                <motion.div
                  layoutId={`card-${pendingCard.card.id}`}
                  className={`p-8 md:p-10 rounded-[2.5rem] border-[8px] border-white max-w-sm w-full text-center shadow-[0_20px_50px_rgba(0,0,0,0.3)] flex flex-col items-center ${GRADE_BG[pendingCard.card.grade]} relative overflow-hidden`}
                >
                  <div className="flex justify-center mb-4 relative z-10">
                    {pendingCard.card.type === 'Enemy' && <Skull className="w-24 h-24 text-red-500 drop-shadow-md" />}
                    {pendingCard.card.type === 'Loot' && <Gem className="w-24 h-24 text-emerald-500 drop-shadow-md" />}
                    {pendingCard.card.type === 'Reroll' && <RefreshCw className="w-24 h-24 text-blue-500 drop-shadow-md" />}
                  </div>
                  
                  <h2 className={`text-2xl md:text-3xl font-black mb-2 uppercase tracking-tight relative z-10 ${GRADE_TEXT[pendingCard.card.grade]}`}>
                    {pendingCard.card.name}
                  </h2>
                  
                  <div className={`text-6xl md:text-8xl font-black mb-4 relative z-10 drop-shadow-md ${GRADE_TEXT[pendingCard.card.grade]}`}>
                    {pendingCard.card.type === 'Reroll' ? '+1' : pendingCard.card.value}
                  </div>

                  {pendingCard.card.description && (
                    <div className="w-full p-4 mb-6 rounded-2xl bg-white/40 text-sm md:text-base font-bold text-slate-800 leading-tight relative z-10 backdrop-blur-sm border border-white/50 shadow-inner">
                      {pendingCard.card.description}
                    </div>
                  )}

                  <button
                    onClick={() => resolveCard(pendingCard.stackIndex, pendingCard.card)}
                    className={`btn-casual w-full py-5 rounded-full font-black text-xl uppercase tracking-widest transition-colors text-white border-b-[8px] relative z-10 ${
                      pendingCard.card.type === 'Enemy' 
                      ? 'bg-gradient-to-b from-red-400 to-red-500 border-red-600 hover:from-red-300 hover:to-red-400 shadow-[0_10px_20px_rgba(239,68,68,0.3)]' 
                      : 'bg-gradient-to-b from-emerald-400 to-emerald-500 border-emerald-600 hover:from-emerald-300 hover:to-emerald-400 shadow-[0_10px_20px_rgba(16,185,129,0.3)]'
                    }`}
                  >
                    {pendingCard.card.type === 'Enemy' ? 'В БОЙ!' : 'ЗАБРАТЬ'}
                  </button>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>

          {/* ЭКРАН ПОРАЖЕНИЯ */}
          <AnimatePresence>
            {gameOver && (
              <motion.div
                initial={{ opacity: 0 }}
                animate={{ opacity: 1 }}
                exit={{ opacity: 0 }}
                className="fixed inset-0 bg-slate-900/80 backdrop-blur-md flex items-center justify-center p-4 z-50"
              >
                <motion.div
                  initial={{ scale: 0.9, y: 20 }}
                  animate={{ scale: 1, y: 0 }}
                  className="bg-white p-8 md:p-10 rounded-[2.5rem] border-[8px] border-slate-200 max-w-sm w-full text-center shadow-[0_20px_50px_rgba(0,0,0,0.5)] relative overflow-hidden"
                >
                  <div className="w-24 h-24 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-red-200">
                    <Skull className="w-12 h-12 text-red-500" />
                  </div>
                  <h2 className="text-4xl font-black text-slate-800 mb-2 uppercase">Вы Погибли</h2>
                  <p className="text-slate-500 mb-8 font-bold">Враг оказался слишком силен.</p>

                  <div className="grid grid-cols-2 gap-4 mb-8">
                    <div className="bg-slate-100 p-4 rounded-3xl border-b-4 border-slate-200">
                      <div className="text-slate-400 text-[10px] font-black uppercase mb-1">Сила</div>
                      <div className="text-3xl font-black text-green-500">{playerLevel}</div>
                    </div>
                    <div className="bg-slate-100 p-4 rounded-3xl border-b-4 border-slate-200">
                      <div className="text-slate-400 text-[10px] font-black uppercase mb-1">Очки</div>
                      <div className="text-3xl font-black text-amber-500">{score}</div>
                    </div>
                  </div>

                  <button
                    onClick={restartGame}
                    className="btn-casual w-full py-5 bg-gradient-to-b from-blue-400 to-blue-500 border-b-[8px] border-blue-600 text-white rounded-full font-black text-xl uppercase tracking-widest hover:from-blue-300 hover:to-blue-400 transition-colors shadow-[0_10px_20px_rgba(59,130,246,0.3)]"
                  >
                    Играть Снова
                  </button>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
